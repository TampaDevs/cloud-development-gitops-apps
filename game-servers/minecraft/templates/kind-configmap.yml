apiVersion: v1
kind: ConfigMap
metadata:
  name: paper-global-yml
  namespace: ontampa-devs-gaming
data:
  paper-global.yml: |+
    ---
    _version: 29
    anticheat:
      obfuscation:
        items:
          all-models:
            also-obfuscate: []
            dont-obfuscate:
            - minecraft:lodestone_tracker
            sanitize-count: true
          enable-item-obfuscation: false
          model-overrides:
            minecraft:elytra:
              also-obfuscate: []
              dont-obfuscate:
              - minecraft:damage
              sanitize-count: true
    block-updates:
      disable-chorus-plant-updates: false
      disable-mushroom-block-updates: false
      disable-noteblock-updates: false
      disable-tripwire-updates: false
    chunk-loading-advanced:
      auto-config-send-distance: true
      player-max-concurrent-chunk-generates: 0
      player-max-concurrent-chunk-loads: 0
    chunk-loading-basic:
      player-max-chunk-generate-rate: -1.0
      player-max-chunk-load-rate: 100.0
      player-max-chunk-send-rate: 75.0
    chunk-system:
      gen-parallelism: default
      io-threads: -1
      worker-threads: -1
    collisions:
      enable-player-collisions: true
      send-full-pos-for-hard-colliding-entities: true
    commands:
      ride-command-allow-player-as-vehicle: false
      suggest-player-names-when-null-tab-completions: true
      time-command-affects-all-worlds: false
    console:
      enable-brigadier-completions: true
      enable-brigadier-highlighting: true
      has-all-permissions: false
    item-validation:
      book:
        author: 8192
        page: 16384
        title: 8192
      book-size:
        page-max: 2560
        total-multiplier: 0.98
      display-name: 8192
      lore-line: 8192
      resolve-selectors-in-books: false
    logging:
      deobfuscate-stacktraces: true
    messages:
      kick:
        authentication-servers-down: <lang:multiplayer.disconnect.authservers_down>
        connection-throttle: Connection throttled! Please wait before reconnecting.
        flying-player: <lang:multiplayer.disconnect.flying>
        flying-vehicle: <lang:multiplayer.disconnect.flying>
      no-permission: <red>I'm sorry, but you do not have permission to perform this command.
        Please contact the server administrators if you believe that this is in error.
      use-display-name-in-quit-message: false
    misc:
      chat-threads:
        chat-executor-core-size: -1
        chat-executor-max-size: -1
      client-interaction-leniency-distance: default
      compression-level: default
      load-permissions-yml-before-plugins: true
      max-joins-per-tick: 5
      prevent-negative-villager-demand: false
      region-file-cache-size: 256
      send-full-pos-for-item-entities: false
      strict-advancement-dimension-check: false
      use-alternative-luck-formula: false
      use-dimension-type-for-custom-spawners: false
      xp-orb-groups-per-area: default
    packet-limiter:
      all-packets:
        action: KICK
        interval: 7.0
        max-packet-rate: 500.0
      kick-message: <red><lang:disconnect.exceeded_packet_rate>
      overrides:
        ServerboundPlaceRecipePacket:
          action: DROP
          interval: 4.0
          max-packet-rate: 5.0
    player-auto-save:
      max-per-tick: -1
      rate: -1
    proxies:
      bungee-cord:
        online-mode: true
      proxy-protocol: false
      velocity:
        enabled: true
        online-mode: true
        secret: 'ccdFTmkdlTq7'
    scoreboards:
      save-empty-scoreboard-teams: true
      track-plugin-scoreboards: false
    spam-limiter:
      incoming-packet-threshold: 300
      recipe-spam-increment: 1
      recipe-spam-limit: 20
      tab-spam-increment: 1
      tab-spam-limit: 500
    spark:
      enable-immediately: false
      enabled: true
    unsupported-settings:
      allow-headless-pistons: false
      allow-permanent-block-break-exploits: false
      allow-piston-duplication: false
      allow-unsafe-end-portal-teleportation: false
      compression-format: ZLIB
      perform-username-validation: true
      skip-tripwire-hook-placement-validation: false
      skip-vanilla-damage-tick-when-shield-blocked: false
      update-equipment-on-player-actions: true
    watchdog:
      early-warning-delay: 10000
      early-warning-every: 5000
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: mc-proxy
    app.kubernetes.io/part-of: minecraft
  name: velocity-toml
  namespace: ontampa-devs-gaming
data:
  velocity.toml: |
    config-version = "2.7"
    bind = "0.0.0.0:25565"
    motd = "Im a server what more do you want from me"
    show-max-players = 500
    online-mode = true
    force-key-authentication = true
    prevent-client-proxy-connections = false
    player-info-forwarding-mode = "modern"
    forwarding-secret-file = "forwarding.secret"
    announce-forge = false
    kick-existing-players = false
    ping-passthrough = "DISABLED"
    sample-players-in-ping = false
    enable-player-address-logging = true

    [servers]
    hub = "hub.ontampa-devs-gaming.svc.cluster.local:25565"
    smp = "smp.ontampa-devs-gaming.svc.cluster.local:25565"
    try = [
        "hub",
        "smp"
    ]
    [forced-hosts]

    [advanced]
    compression-threshold = 256
    compression-level = -1
    login-ratelimit = 3000
    connection-timeout = 5000
    read-timeout = 30000
    haproxy-protocol = false
    tcp-fast-open = false
    bungee-plugin-message-channel = true
    show-ping-requests = false
    failover-on-unexpected-server-disconnect = true
    announce-proxy-commands = true
    log-command-executions = false
    log-player-connections = true
    accepts-transfers = false
    enable-reuse-port = false
    command-rate-limit = 50
    forward-commands-if-rate-limited = true
    kick-after-rate-limited-commands = 0
    tab-complete-rate-limit = 10
    kick-after-rate-limited-tab-completes = 0

    [query]
    enabled = true
    port = 25565
    map = "Velocity"
    show-plugins = false
