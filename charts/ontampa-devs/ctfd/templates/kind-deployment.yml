---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ontampa-devs-ctfd
  labels:
    app: postgres
    app.kubernetes.io/part-of: ctfd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault 
      containers:
        - name: postgres
          image: quay.io/sclorg/postgresql-16-c10s:latest
          envFrom:
            - secretRef:
                name: postgres-secrets
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 128m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ontampa-devs-ctfd
  labels:
    app: redis
    app.kubernetes.io/part-of: ctfd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: quay.io/sclorg/redis-6-c9s:latest
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_PASSWORD
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 128m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a $REDIS_PASSWORD ping"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a $REDIS_PASSWORD ping"
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctfd
  namespace: ontampa-devs-ctfd
  labels:
    app: ctfd
    app.kubernetes.io/part-of: ctfd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctfd
  template:
    metadata:
      labels:
        app: ctfd
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo 'waiting for PostgreSQL'; sleep 3; done"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo 'waiting for Redis'; sleep 3; done"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: ctfd
          image: quay.io/tampadevs/ctfd-oidc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: REDIS_URL
            - name: UPLOAD_PROVIDER
              value: "s3"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bucket-ctfd 
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bucket-ctfd
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: bucket-ctfd 
                  key: BUCKET_NAME
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: bucket-ctfd
                  key: BUCKET_REGION
            - name: _BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: bucket-ctfd
                  key: BUCKET_HOST
            - name: _BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: bucket-ctfd
                  key: BUCKET_PORT
            - name: AWS_S3_ENDPOINT_URL
              value: "https://$(_BUCKET_HOST):$(_BUCKET_PORT)"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: ctfd-app-secrets
                  key: OIDC_ISSUER
            - name: OAUTH_ALWAYS_POSSIBLE
              value: "True"
            - name: OAUTH_CREATE_BUTTONS
              value: "True"
            - name: WORKERS
              value: "4"
            - name: PREFERRED_URL_SCHEME
              value: "https"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
