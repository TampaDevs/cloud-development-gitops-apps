---
# ESS Community 26.4.0 - values-gaspar.yaml
# serverName is PERMANENT - cannot change without full DB wipe
serverName: ontampa.dev
ingress:
  className: openshift-default
  annotations:
    haproxy.router.openshift.io/timeout: "600s"
    haproxy.router.openshift.io/proxy-body-size: "50m"
  tlsSecret: tls-certificate-chat-ontampa-dev
postgres:
  enabled: false
synapse:
  ingress:
    host: matrix.ontampa.dev
  postgres:
    host: bridge-postgres-synapse-service.ontampa-devs-chats.svc.cluster.local
    port: 5432
    database: synapse
    user: synapse
    password:
      secret: bridge-postgres-secrets
      secretKey: synapse-auth
  additional:
    unsafe-locale.yaml:
      config: |
        database:
          allow_unsafe_locale: true
matrixAuthenticationService:
  ingress:
    host: account.ontampa.dev
  postgres:
    host: bridge-postgres-mas-service.ontampa-devs-chats.svc.cluster.local
    port: 5432
    database: mas
    user: mas
    password:
      secret: bridge-postgres-secrets
      secretKey: mas-auth
  extraVolumes:
    - name: oidc-tampa-dev
      secret:
        secretName: bridge-oidc-tampa-dev
  extraVolumeMounts:
    - name: oidc-tampa-dev
      mountPath: /secrets/bridge-oidc-tampa-dev
      readOnly: true
  additional:
    passwords.yaml:
      config: |
        passwords:
          enabled: false
    admin-user.yaml:
      config: |
        policy:
          data:
            admin_users:
              - patch
              - desync
            admin_clients:
              - https://admin.ontampa.dev
    oidc.yaml:
      config: |
        upstream_oauth2:
          providers:
            - id: 01HFVBY12TMNTYTBV8W921M5FA
              human_name: Tampa.dev
              issuer: https://tampa.dev
              client_id: td_8b853abc846b34ed445b846fd0195a74
              client_secret_file: /secrets/bridge-oidc-tampa-dev/client_secret
              token_endpoint_auth_method: client_secret_post
              scope: "openid profile email"
              claims_imports:
                localpart:
                  action: suggest
                  template: "{{ user.preferred_username }}"
                displayname:
                  action: suggest
                  template: "{{ user.name }}"
                email:
                  action: suggest
                  template: "{{ user.email }}"
                email_verified:
                  action: suggest
                  template: "{{ user.email_verified }}"
    branding.yaml:
      config: |
        branding:
          service_name: "Tampa Devs Chat"
          policy_uri: "https://ontampa.dev/privacy"
          tos_uri: "https://ontampa.dev/terms"
          logo_uri: "https://tampadevs.com/images/press/tdevs_transparent_1024x1024.png"
          color_scheme: "#1C2438"
elementWeb:
  ingress:
    host: chat.ontampa.dev
    annotations:
      haproxy.router.openshift.io/response-rewrite-rule: |
        /favicon.ico https://tampadevs.com/images/press/tdevs_transparent_1024x1024.png
  additional:
    config.json: |
      {"default_server_config":{"m.homeserver":{"base_url":"https://matrix.ontampa.dev","server_name":"ontampa.dev"}},"brand":"Tampa Devs Chat","default_theme":"dark","default_country_code":"US","room_directory":{"servers":["ontampa.dev"]},"setting_defaults":{"custom_themes":[{"name":"Tampa Devs","is_dark":true,"colors":{"primary-color":"#E85A4F","accent-color":"#B6A991","warning-color":"#F07167","sidebar-color":"#1A2031","roomlist-background-color":"#1C2438","roomlist-text-color":"#FFFFFF","roomlist-text-secondary-color":"#B6A991","roomlist-highlights-color":"#2B3447","roomlist-separator-color":"#2B3447","timeline-background-color":"#1C2438","timeline-text-color":"#FFFFFF","timeline-text-secondary-color":"#B6A991","timeline-highlights-color":"#2B3447","reaction-row-button-selected-bg-color":"#E85A4F","menu-selected-color":"#E85A4F","focus-bg-color":"#2B3447","header-panel-bg-color":"#1A2031","header-panel-text-primary-color":"#FFFFFF","header-panel-text-secondary-color":"#B6A991","search-bg-color":"#2B3447","input-darker-bg-color":"#1A2031","input-border-color":"#2B3447","strong-input-border-color":"#E85A4F","input-valid-border-color":"#E85A4F","input-invalid-border-color":"#C44D44"}}]}}
elementAdmin:
  ingress:
    host: admin.ontampa.dev
matrixRTC:
  ingress:
    host: mrtc.ontampa.dev
