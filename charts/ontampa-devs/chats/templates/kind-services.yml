---
apiVersion: v1
kind: Service
metadata:
  name: bridge-postgres-synapse-service
  namespace: ontampa-devs-chats
  labels:
    app: synapse
    app.kubernetes.io/part-of: bridge-postgres
spec:
  selector:
    app: synapse
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-postgres-mas-service
  namespace: ontampa-devs-chats
  labels:
    app: mas
    app.kubernetes.io/part-of: bridge-postgres
spec:
  selector:
    app: mas
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  type: ClusterIP

